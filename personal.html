<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Wukong v3 — Agent-Centered</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{height:100%;width:100%;overflow:hidden}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}.animate-pulse{animation:pulse 2s cubic-bezier(.4,0,.6,1) infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeIn .25s ease-out}
@keyframes slideRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}.slide-right{animation:slideRight .2s ease-out}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:10px}::-webkit-scrollbar-thumb:hover{background:#9ca3af}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

/* ═══════════════ DATA ═══════════════ */
const allAgents=[
  {id:"research",name:"Ресёрч-агент",status:"active",task:"Анализ поставщиков",icon:"🔍",skills:["Web Search","DB Query","Report Gen"]},
  {id:"doc",name:"Документ-агент",status:"active",task:"Подготовка договора",icon:"📄",skills:["DOCX Gen","PDF Gen","Template Fill"]},
  {id:"analyst",name:"Аналитик",status:"waiting",task:"Финансовый отчёт Q1",icon:"📊",skills:["Data Analysis","Charts","Excel"]},
  {id:"hr",name:"HR-агент",status:"completed",task:"Скрининг кандидатов",icon:"👤",skills:["CV Parsing","Interview","Scoring"]},
  {id:"legal",name:"Юрист-агент",status:"idle",task:"—",icon:"⚖️",skills:["Contract Review","Compliance","Risk"]},
  {id:"comms",name:"Коммуникатор",status:"idle",task:"—",icon:"📧",skills:["Email","Summary","Translation"]},
];

const automations=[
  {id:1,icon:"☀️",name:"Утренняя сводка",schedule:"07:30",status:"success"},
  {id:2,icon:"📧",name:"Мониторинг Foxconn",schedule:"триггер",status:"success"},
  {id:3,icon:"💰",name:"Еженедельные расходы",schedule:"пт 17:00",status:"success"},
  {id:4,icon:"📦",name:"Трекер цены iPhone",schedule:"6ч",status:"monitoring"},
  {id:5,icon:"📋",name:"Понедельничная сводка",schedule:"пн 08:00",status:"success"},
];

const todos=[
  {id:1,title:"Согласовать договор Foxconn",pri:"P0",dl:"сегодня 18:00"},
  {id:2,title:"Ответить на запрос HR",pri:"P0",dl:"сегодня"},
  {id:3,title:"Проверить результаты ресёрча",pri:"P1"},
  {id:4,title:"Повестка для review",pri:"P1",dl:"16:30"},
  {id:5,title:"Обновить шаблон договора",pri:"P2"},
];

const priColor={P0:"bg-red-500",P1:"bg-orange-500",P2:"bg-amber-400",P3:"bg-gray-400"};

const threads=[
  {id:"morning",label:"Утренний брифинг",icon:"☀️",time:"08:00",unread:0},
  {id:"foxconn",label:"Foxconn: анализ цен",icon:"📊",time:"08:15",unread:1},
  {id:"flights",label:"Рейсы МСК–SHA",icon:"🛫",time:"вчера",unread:0},
  {id:"expense",label:"Expense Report",icon:"🧾",time:"вчера",unread:0},
];

const workspaces=[
  {id:"procurement",name:"Закупки",color:"bg-orange-500",desc:"Поиск поставщиков, тендеры, сравнение цен",count:3,agents:3,done:"9/12",
   tasks:[{name:"Резюме по поставщикам",status:"active",progress:60},{name:"Тендер Q2",status:"active",progress:25},{name:"Обновление прайса",status:"waiting",progress:80}]},
  {id:"marketing",name:"Маркетинг",color:"bg-blue-500",desc:"Контент, аналитика, рассылки",count:1,agents:2,done:"4/6",
   tasks:[{name:"Отчёт по кампании",status:"active",progress:45}]},
  {id:"hr",name:"HR отдел",color:"bg-purple-500",desc:"Подбор, онбординг, оценка",count:2,agents:2,done:"7/8",
   tasks:[{name:"Скрининг кандидатов",status:"completed",progress:100},{name:"Онбординг Дмитрия",status:"active",progress:60}]},
];

const calendarEvents=[
  {t:"09:00",n:"Стендап закупок",d:"30м",urgent:false,prep:"Влад подготовил повестку"},
  {t:"11:00",n:"1-on-1 с Алексеем",d:"45м",urgent:false,prep:null},
  {t:"14:00",n:"Встреча с Foxconn",d:"1ч",urgent:true,prep:"Сравнение цен готово"},
  {t:"16:30",n:"Review AI-команды",d:"30м",urgent:false,prep:null},
];

const mails=[
  {f:"Foxconn",s:"Обновлённый прайс — цены ↑ на 3 позиции (8-12%)",urgent:true,hasDraft:true},
  {f:"HR отдел",s:"Согласование отпуска Дмитрия",urgent:true,hasDraft:true},
  {f:"Финансы",s:"Бюджет Q2 — на ознакомление",urgent:false,hasDraft:false},
];

const flightExec={
  title:"Рейсы Москва–Шанхай",
  steps:[
    {title:"Поиск рейсов 1–3 апреля",status:"completed",detail:"12 найдено"},
    {title:"Фильтрация ≤30,000₽, эконом",status:"completed",detail:"5 подходят"},
    {title:"Сравнение и сортировка",status:"completed",detail:"по цене"},
    {title:"Генерация таблицы",status:"completed",detail:"готово"},
  ],
  elapsed:"2m 15s",
  resultSummary:"5 рейсов, лучший — Aeroflot SU208, 24,500₽",
  table:{cols:["Рейс","Дата","Время","Цена"],rows:[["SU208","1 апр","10:25","24,500₽"],["CA934","1 апр","14:10","26,200₽"],["HU7985","2 апр","08:40","27,800₽"],["SU212","3 апр","11:55","28,100₽"],["CA938","2 апр","19:30","29,500₽"]]}
};

/* ═══════════════ SMALL COMPONENTS ═══════════════ */

function ExecutionCard({exec,showTable}){
  return(
    <div className="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm fade-in max-w-lg">
      <div className="px-4 py-2.5 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
        <span className="text-sm font-semibold text-gray-700">{exec.title}</span>
        <span className="text-xs text-gray-400 font-mono">⏱ {exec.elapsed}</span>
      </div>
      <div className="px-4 py-3 space-y-2">
        {exec.steps.map((s,i)=>(
          <div key={i} className="flex items-center gap-2.5">
            <span className="w-5 text-center shrink-0">
              {s.status==="completed"?<span className="text-green-500 text-sm">✅</span>:
               s.status==="running"?<span className="text-orange-500 text-sm animate-pulse">●</span>:
               <span className="text-gray-300 text-sm">○</span>}
            </span>
            <span className={`text-sm ${s.status==="pending"?"text-gray-400":"text-gray-700"}`}>{s.title}</span>
            {s.detail&&<span className="text-xs text-gray-400 ml-auto">{s.detail}</span>}
          </div>
        ))}
      </div>
      {exec.resultSummary&&(
        <div className="px-4 py-3 border-t border-gray-100 bg-green-50">
          <div className="text-sm text-green-700 font-medium">{exec.resultSummary}</div>
          <div className="flex gap-2 mt-2">
            <button className="px-3 py-1.5 bg-indigo-500 text-white rounded-lg text-xs font-medium cursor-pointer hover:bg-indigo-600">📄 Открыть</button>
            <button className="px-3 py-1.5 bg-gray-100 text-gray-600 rounded-lg text-xs font-medium cursor-pointer hover:bg-gray-200">💾 Скачать</button>
          </div>
        </div>
      )}
      {showTable&&exec.table&&(
        <div className="px-4 py-3 border-t border-gray-100 overflow-x-auto">
          <table className="w-full text-sm">
            <thead><tr className="border-b border-gray-100">{exec.table.cols.map((c,i)=><th key={i} className="text-left py-1.5 pr-4 text-gray-500 font-medium text-xs uppercase">{c}</th>)}</tr></thead>
            <tbody>{exec.table.rows.map((r,i)=><tr key={i} className="border-b border-gray-50">{r.map((c,j)=><td key={j} className={`py-1.5 pr-4 text-sm ${j===3?"font-semibold text-gray-800":"text-gray-600"}`}>{c}</td>)}</tr>)}</tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function ConfirmCard({title,steps,onConfirm}){
  return(
    <div className="bg-white border-2 border-indigo-200 rounded-xl overflow-hidden shadow-sm fade-in max-w-lg">
      <div className="px-4 py-2.5 bg-indigo-50 border-b border-indigo-100 flex items-center justify-between">
        <span className="text-sm font-semibold text-indigo-700">{title}</span>
        <span className="text-xs text-indigo-400 bg-indigo-100 px-2 py-0.5 rounded-full">план</span>
      </div>
      <div className="px-4 py-3 space-y-1.5">
        {steps.map((s,i)=><div key={i} className="flex items-center gap-2.5 text-sm text-gray-600"><span className="text-gray-300 font-mono text-xs w-4 text-right">{i+1}.</span>{s}</div>)}
      </div>
      <div className="px-4 py-3 border-t border-indigo-100 flex gap-2">
        <button onClick={onConfirm} className="px-4 py-2 bg-indigo-500 text-white rounded-lg text-sm font-medium cursor-pointer hover:bg-indigo-600">✓ Запустить</button>
        <button className="px-4 py-2 text-gray-400 text-sm cursor-pointer hover:text-gray-600">✏️ Изменить</button>
      </div>
    </div>
  );
}

function BlockedCard(){
  return(
    <div className="bg-red-50 border border-red-200 rounded-xl p-4 fade-in max-w-lg">
      <div className="text-sm font-medium text-red-700 mb-1.5">🚫 За пределами полномочий</div>
      <div className="text-sm text-red-600 mb-3">Я не могу отправлять письма напрямую. Но я могу:</div>
      <div className="space-y-1.5">
        {["📧 Подготовить черновик письма","📎 Прикрепить актуальный прайс","📋 Добавить в задачи"].map((o,i)=>(
          <button key={i} className="w-full text-left px-3 py-2 bg-white border border-red-100 rounded-lg text-sm text-gray-700 hover:bg-red-50 cursor-pointer">{o}</button>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════ INLINE CHAT WIDGETS ═══════════════ */
function CalendarWidget(){
  return(
    <div className="bg-white border border-gray-200 rounded-xl overflow-hidden max-w-lg fade-in">
      <div className="px-4 py-2.5 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
        <span className="text-sm font-semibold text-gray-700">📅 Расписание — Вт, 25 марта</span>
        <span className="text-xs text-gray-400">4 встречи</span>
      </div>
      {calendarEvents.map((e,i)=>(
        <div key={i} className={`px-4 py-2.5 flex items-center gap-3 border-b border-gray-50 last:border-0 hover:bg-gray-50 cursor-pointer ${e.urgent?"border-l-4 border-l-red-400":""}`}>
          <span className="text-xs font-mono text-gray-400 w-10 shrink-0">{e.t}</span>
          <div className="flex-1 min-w-0">
            <div className="text-sm text-gray-800 font-medium">{e.n}</div>
            {e.prep&&<div className="text-xs text-indigo-500 mt-0.5">✨ {e.prep}</div>}
          </div>
          <span className="text-xs text-gray-400 shrink-0">{e.d}</span>
          {e.urgent&&<span className="px-1.5 py-0.5 bg-red-100 text-red-600 rounded text-xs shrink-0">⚠️</span>}
        </div>
      ))}
    </div>
  );
}

function MailWidget(){
  return(
    <div className="bg-white border border-gray-200 rounded-xl overflow-hidden max-w-lg fade-in">
      <div className="px-4 py-2.5 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
        <span className="text-sm font-semibold text-gray-700">📧 Почта — 3 требуют ответа</span>
        <span className="text-xs text-gray-400">12 новых</span>
      </div>
      {mails.map((m,i)=>(
        <div key={i} className="px-4 py-2.5 flex items-center gap-3 border-b border-gray-50 last:border-0 hover:bg-gray-50 cursor-pointer">
          <div className="flex-1 min-w-0"><span className="text-sm font-semibold text-gray-800">{m.f}: </span><span className="text-sm text-gray-600">{m.s}</span></div>
          {m.hasDraft&&<button className="px-2.5 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-xs font-medium cursor-pointer hover:bg-indigo-100 shrink-0">Черновик</button>}
        </div>
      ))}
    </div>
  );
}

function TodoWidget(){
  return(
    <div className="bg-white border border-gray-200 rounded-xl overflow-hidden max-w-lg fade-in">
      <div className="px-4 py-2.5 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
        <span className="text-sm font-semibold text-gray-700">📋 Мои задачи</span><span className="text-xs text-gray-400">5 задач</span>
      </div>
      <div className="py-1">{todos.map(t=>(
        <div key={t.id} className="px-4 py-2 flex items-center gap-2.5 hover:bg-gray-50 cursor-pointer">
          <span className={`w-2.5 h-2.5 rounded-full shrink-0 ${priColor[t.pri]}`}/><span className="text-sm text-gray-800 flex-1">{t.title}</span>
          {t.dl&&<span className="text-xs text-gray-400 shrink-0">{t.dl}</span>}
        </div>
      ))}</div>
    </div>
  );
}

function AutomationsWidget(){
  return(
    <div className="bg-white border border-gray-200 rounded-xl overflow-hidden max-w-lg fade-in">
      <div className="px-4 py-2.5 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
        <span className="text-sm font-semibold text-gray-700">🔄 Автоматизации</span><span className="text-xs text-green-600">{automations.length} активных</span>
      </div>
      <div className="p-3 flex flex-wrap gap-2">
        {automations.map(a=>(
          <div key={a.id} className={`px-3 py-1.5 rounded-lg border text-xs flex items-center gap-1.5 cursor-pointer hover:shadow-sm ${a.status==="monitoring"?"border-blue-200 bg-blue-50":"border-green-200 bg-green-50"}`}>
            <span>{a.icon}</span><span className="font-medium text-gray-700">{a.name}</span><span className="text-gray-400">{a.schedule}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function ActiveExecutionsWidget(){
  return(
    <div className="max-w-lg fade-in flex gap-3">
      <div className="bg-white rounded-xl border border-green-200 p-3 flex-1">
        <div className="flex items-center justify-between mb-1.5"><span className="text-xs font-semibold text-gray-800">🛫 Рейсы МСК–SHA</span><span className="text-xs text-green-600">✅</span></div>
        <div className="flex gap-0.5">{[1,2,3,4].map(i=><div key={i} className="w-full h-1 bg-green-400 rounded-full"/>)}</div>
        <div className="text-xs text-gray-500 mt-1">5 вариантов · 2m 15s</div>
      </div>
      <div className="bg-white rounded-xl border border-orange-200 p-3 flex-1">
        <div className="flex items-center justify-between mb-1.5"><span className="text-xs font-semibold text-gray-800">🧾 Expense март</span><span className="text-xs text-orange-500 animate-pulse">●</span></div>
        <div className="flex gap-0.5">{[1,2].map(i=><div key={i} className="w-full h-1 bg-green-400 rounded-full"/>)}<div className="w-full h-1 bg-orange-400 rounded-full animate-pulse"/><div className="w-full h-1 bg-gray-200 rounded-full"/></div>
        <div className="text-xs text-gray-500 mt-1">шаг 3/4 · 1m 32s</div>
      </div>
    </div>
  );
}

function WorkspaceInlineWidget({ws,onOpen}){
  const agents=allAgents.filter(a=>["research","doc","analyst"].includes(a.id));
  return(
    <div className="bg-white border border-gray-200 rounded-xl overflow-hidden max-w-lg fade-in">
      <div className="px-4 py-2.5 bg-orange-50 border-b border-orange-100 flex items-center gap-2">
        <span className={`w-6 h-6 rounded-lg ${ws.color} flex items-center justify-center text-white text-xs font-bold`}>{ws.name[0]}</span>
        <span className="text-sm font-semibold text-gray-800">Пространство: {ws.name}</span>
      </div>
      <div className="grid grid-cols-3 gap-3 p-3">
        <div className="text-center"><div className="text-lg font-bold text-green-600">{ws.count}</div><div className="text-xs text-gray-400">активных</div></div>
        <div className="text-center"><div className="text-lg font-bold text-blue-600">{ws.agents}</div><div className="text-xs text-gray-400">агентов</div></div>
        <div className="text-center"><div className="text-lg font-bold text-purple-600">{ws.done}</div><div className="text-xs text-gray-400">завершено</div></div>
      </div>
      <div className="border-t border-gray-100">
        {ws.tasks.map((t,i)=>(
          <div key={i} className="px-4 py-2 flex items-center gap-3 border-b border-gray-50 last:border-0">
            <span className={`w-2 h-2 rounded-full shrink-0 ${t.status==="active"?"bg-green-500":t.status==="waiting"?"bg-amber-400":"bg-blue-400"}`}/>
            <span className="text-sm text-gray-700 flex-1">{t.name}</span>
            <div className="w-16 h-1.5 bg-gray-100 rounded-full overflow-hidden"><div className={`h-full rounded-full ${t.status==="active"?"bg-green-400":t.status==="waiting"?"bg-amber-400":"bg-blue-400"}`} style={{width:`${t.progress}%`}}/></div>
            <span className="text-xs text-gray-400 w-8 text-right">{t.progress}%</span>
          </div>
        ))}
      </div>
      <div className="px-4 py-2.5 bg-gray-50 flex items-center justify-between">
        <div className="flex items-center gap-2">
          <div className="flex -space-x-1.5">{agents.map(a=><div key={a.id} className="w-5 h-5 rounded-full bg-gray-200 flex items-center justify-center text-xs border border-white">{a.icon}</div>)}</div>
          <span className="text-xs text-gray-400">{agents.length} агентов</span>
        </div>
        <button onClick={onOpen} className="text-xs text-indigo-600 hover:text-indigo-700 cursor-pointer font-medium">Подробнее →</button>
      </div>
    </div>
  );
}

/* ═══════════════ AGENT / USER MESSAGES ═══════════════ */
function AgentMsg({children,proactive,time}){
  return(
    <div className="flex gap-3 items-start fade-in">
      <div className="w-9 h-9 rounded-full bg-gradient-to-br from-indigo-500 to-violet-600 shrink-0 flex items-center justify-center text-white text-sm shadow-md">🧑‍💼</div>
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2 mb-1">
          <span className="text-sm font-semibold text-gray-800">Персональный агент</span>
          {proactive&&<span className="px-1.5 py-0.5 bg-indigo-100 text-indigo-600 rounded text-xs">✨ проактивно</span>}
          {time&&<span className="text-xs text-gray-400">{time}</span>}
        </div>
        <div className="space-y-3">{children}</div>
      </div>
    </div>
  );
}

function UserMsg({children}){
  return(<div className="flex justify-end fade-in"><div className="bg-indigo-600 text-white rounded-2xl rounded-tr-md px-4 py-2.5 max-w-md text-sm shadow-sm">{children}</div></div>);
}

function SystemMsg({children}){
  return(<div className="flex justify-center fade-in"><div className="bg-gray-100 text-gray-500 rounded-full px-4 py-1.5 text-xs">{children}</div></div>);
}

/* ═══════════════ CONTEXT PANEL ═══════════════ */
function ContextPanel({context,onClose}){
  if(!context)return null;
  return(
    <div className="w-80 border-l border-gray-200 bg-white flex flex-col shrink-0 slide-right overflow-hidden">
      <div className="px-4 py-3 border-b border-gray-100 flex items-center justify-between shrink-0">
        <span className="text-sm font-semibold text-gray-800">{context.title}</span>
        <button onClick={onClose} className="text-gray-400 hover:text-gray-600 cursor-pointer">✕</button>
      </div>
      <div className="flex-1 overflow-y-auto p-4 space-y-4">
        {context.type==="workspace"&&(
          <>
            <div className="space-y-3">
              <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider">Задачи</div>
              {(context.ws||workspaces[0]).tasks.map((t,i)=>(
                <div key={i} className="p-3 bg-gray-50 rounded-xl">
                  <div className="flex items-center justify-between mb-1.5">
                    <span className="text-sm font-medium text-gray-800">{t.name}</span>
                    <span className={`w-2 h-2 rounded-full ${t.status==="active"?"bg-green-500":t.status==="waiting"?"bg-amber-400":"bg-blue-400"}`}/>
                  </div>
                  <div className="w-full h-1.5 bg-gray-200 rounded-full"><div className={`h-full rounded-full ${t.status==="active"?"bg-green-400":t.status==="waiting"?"bg-amber-400":"bg-blue-400"}`} style={{width:`${t.progress}%`}}/></div>
                </div>
              ))}
            </div>
            <div className="space-y-2">
              <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider">Агенты</div>
              {allAgents.filter(a=>["research","doc","analyst"].includes(a.id)).map(a=>(
                <div key={a.id} className="flex items-center gap-2 p-2 rounded-lg hover:bg-gray-50">
                  <span className="text-lg">{a.icon}</span>
                  <div className="flex-1"><div className="text-sm font-medium text-gray-700">{a.name}</div><div className="text-xs text-gray-400">{a.task}</div></div>
                  <span className={`w-2 h-2 rounded-full ${a.status==="active"?"bg-green-500 animate-pulse":a.status==="waiting"?"bg-amber-400":"bg-gray-300"}`}/>
                </div>
              ))}
            </div>

                      {(["flight_done","workspace_view","expense_plan","expense_running","expense_done","blocked","auto_create","auto_done"].includes(chatState))&&(
                        <AgentMsg time="14:32">
                          <div className="text-sm text-gray-700">Готово! Лучший вариант — <strong>Aeroflot SU208, 24,500₽</strong>.</div>
                          <ExecutionCard exec={flightExec} showTable={true}/>
                          <button onClick={()=>setContextPanel({type:"execution",title:"✈️ Детали поиска"})} className="text-xs text-indigo-600 hover:text-indigo-700 cursor-pointer">Подробнее →</button>
                        </AgentMsg>
                      )}
                    </>
                  )}

                  {/* Workspace demo */}
                  {(["workspace_view","expense_plan","expense_running","expense_done","blocked","auto_create","auto_done"].includes(chatState))&&(
                    <>
                      <UserMsg>Покажи пространство Закупки</UserMsg>
                      <AgentMsg time="14:35">
                        <div className="text-sm text-gray-700">Вот текущий статус:</div>
                        <WorkspaceInlineWidget ws={workspaces[0]} onOpen={()=>setContextPanel({type:"workspace",title:"📦 Закупки",ws:workspaces[0]})}/>
                      </AgentMsg>
                    </>
                  )}

                  {/* Expense demo */}
                  {(["expense_plan","expense_running","expense_done","blocked","auto_create","auto_done"].includes(chatState))&&(
                    <>
                      <UserMsg>Собери чеки из почты за март и сделай expense report</UserMsg>
                      {chatState==="expense_plan"&&(
                        <AgentMsg time="14:40"><ConfirmCard title="Expense Report — март" steps={["Поиск писем с чеками/receipts","Извлечение сумм и категорий","Генерация таблицы","Сохранение xlsx"]} onConfirm={()=>{setChatState("expense_running");setTimeout(()=>setChatState("expense_done"),2000);}}/></AgentMsg>
                      )}
                      {chatState==="expense_running"&&(
                        <AgentMsg time="14:40"><ExecutionCard exec={{title:"Expense Report — март",steps:[{title:"Поиск писем с чеками",status:"completed",detail:"23 письма"},{title:"Извлечение сумм",status:"completed",detail:"19 из 23"},{title:"Генерация таблицы",status:"running",detail:""},{title:"Сохранение xlsx",status:"pending",detail:""}],elapsed:"1m 32s"}}/></AgentMsg>
                      )}
                      {(["expense_done","blocked","auto_create","auto_done"].includes(chatState))&&(
                        <AgentMsg time="14:43">
                          <div className="text-sm text-gray-700">Готово! 19 расходов на ¥12,450. 4 чека для ручной проверки.</div>
                          <ExecutionCard exec={{title:"Expense Report — март",steps:[{title:"Поиск писем",status:"completed",detail:"23"},{title:"Извлечение",status:"completed",detail:"19"},{title:"Таблица",status:"completed",detail:"готово"},{title:"Файл",status:"completed",detail:"expense_march.xlsx"}],elapsed:"2m 48s",resultSummary:"19 расходов · ¥12,450 · expense_march.xlsx"}}/>
                        </AgentMsg>
                      )}
                    </>
                  )}

                  {/* Blocked demo */}
                  {(["blocked","auto_create","auto_done"].includes(chatState))&&(
                    <><UserMsg>Отправь Foxconn наш новый прайс</UserMsg><AgentMsg time="14:45"><BlockedCard/></AgentMsg></>
                  )}

                  {/* Automation demo */}
                  {(["auto_create","auto_done"].includes(chatState))&&(
                    <>
                      <UserMsg>Каждое утро в 7:30 присылай курс юаня, погоду в Шэньчжэне и мои задачи</UserMsg>
                      {chatState==="auto_create"&&(
                        <AgentMsg time="14:48">
                          <div className="text-sm text-gray-700">Создаю автоматизацию:</div>
                          <div className="bg-white border-2 border-amber-200 rounded-xl overflow-hidden max-w-lg fade-in">
                            <div className="px-4 py-2.5 bg-amber-50 border-b border-amber-100"><span className="text-sm font-semibold text-amber-700">🔄 Новая автоматизация</span></div>
                            <div className="px-4 py-3 space-y-2">
                              <div className="text-sm text-gray-700"><strong>Название:</strong> Утренняя сводка</div>
                              <div className="text-sm text-gray-700"><strong>Расписание:</strong> ежедневно, 07:30</div>
                              <div className="text-xs text-gray-500 mt-1">Шаги:</div>
                              {["Получить курс CNY/RUB","Получить погоду Шэньчжэнь","Собрать задачи из пространств","Скомпилировать сводку","Отправить в чат"].map((s,i)=><div key={i} className="flex items-center gap-2.5 text-sm text-gray-600"><span className="text-gray-300 font-mono text-xs w-4 text-right">{i+1}.</span>{s}</div>)}
                            </div>
                            <div className="px-4 py-3 border-t border-amber-100 flex gap-2">
                              <button onClick={()=>setChatState("auto_done")} className="px-4 py-2 bg-amber-500 text-white rounded-lg text-sm font-medium cursor-pointer hover:bg-amber-600">✓ Создать</button>
                              <button className="px-4 py-2 text-gray-400 text-sm cursor-pointer">Изменить</button>
                            </div>
                          </div>
                        </AgentMsg>
                      )}
                      {chatState==="auto_done"&&(
                        <AgentMsg time="14:49">
                          <div className="text-sm text-gray-700">✅ Автоматизация создана! Первый запуск: завтра 07:30.</div>
                          <div className="bg-white border border-gray-200 rounded-xl overflow-hidden max-w-lg fade-in">
                            <div className="px-4 py-2.5 bg-amber-50 border-b border-amber-100 flex items-center gap-2">
                              <span className="text-sm font-semibold text-amber-700">☀️ Утренняя сводка (тест)</span>
                              <span className="px-1.5 py-0.5 bg-amber-200 text-amber-700 rounded text-xs">авто</span>
                            </div>
                            <div className="px-4 py-3 space-y-1.5 text-sm text-gray-700">
                              <div>💱 Курс: 1 CNY = 12.45₽ (▲0.3%)</div>
                              <div>🌤 Шэньчжэнь: 26°C, облачно</div>
                              <div>📋 Задачи (7): Закупки 3, Маркетинг 2, HR 2</div>
                              <div className="text-amber-700">⚠️ Тендер Q2 — дедлайн завтра, 25%</div>
                            </div>
                          </div>
                        </AgentMsg>
                      )}
                    </>
                  )}

                  <div ref={bottomRef}/>
                </div>
              </div>

              {/* Input */}
              <div className="bg-white border-t border-gray-100 px-6 py-4 shrink-0">
                <div className="max-w-2xl mx-auto">
                  <div className="flex items-center gap-3">
                    <div className="flex-1 bg-gray-50 rounded-2xl px-4 py-3 flex items-center border border-gray-200 focus-within:border-indigo-400 focus-within:ring-2 focus-within:ring-indigo-100 transition-all">
                      <input type="text" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSend()}
                        placeholder="Задайте задачу, задайте вопрос, попросите показать данные..."
                        className="flex-1 bg-transparent text-sm outline-none text-gray-700 placeholder-gray-400"/>
                    </div>
                    <button onClick={handleSend} className="w-10 h-10 bg-indigo-500 text-white rounded-xl flex items-center justify-center hover:bg-indigo-600 cursor-pointer shrink-0 text-base shadow-sm">↑</button>
                  </div>
                  <div className="flex gap-2 mt-2.5 flex-wrap">
                    {[{id:"flights",icon:"🛫",label:"Рейсы"},{id:"workspace",icon:"📦",label:"Пространство"},{id:"expense",icon:"🧾",label:"Чеки"},{id:"blocked",icon:"🚫",label:"Блокировка"},{id:"auto",icon:"🔄",label:"Автоматизация"}].map(a=>(
                      <button key={a.id} onClick={()=>handleQuickAction(a.id)} className="px-3 py-1.5 bg-gray-100 rounded-xl text-xs text-gray-500 cursor-pointer hover:bg-indigo-50 hover:text-indigo-600 transition-colors">
                        {a.icon} {a.label}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ─── Overview Tab ─── */}
          {activeTab==="overview"&&<OverviewView/>}

          {/* ─── Workspaces Tab ─── */}
          {activeTab==="workspaces"&&<WorkspacesView onSelect={(ws)=>setContextPanel({type:"workspace",title:`📦 ${ws.name}`,ws})}/>}

          {/* ═══ RIGHT CONTEXT PANEL ═══ */}
          <ContextPanel context={contextPanel} onClose={()=>setContextPanel(null)}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
